<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetrical Game Console</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 2x2 Grid Layout */
        .main-container {
            display: grid;
            grid-template-columns: repeat(2, 350px);
            grid-template-rows: repeat(2, 380px);
            gap: 20px;
        }

        /* Unified Box Style */
        .box {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 2px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .label {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Displays */
        .display-text {
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        /* Inputs */
        input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
        }
        .team-input {
            font-size: 1.8rem;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            width: 100%;
            margin-bottom: 10px;
        }
        .clock-input {
            width: 120px;
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .green { background: var(--success); }
        .red { background: var(--danger); }
        .blue { background: #6366f1; }
        .gray { background: #475569; margin-top: 30px; padding: 10px 30px; }

        /* Remove arrows from number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="box">
            <div class="label">Game Clock</div>
            <div class="display-text">
                <input type="number" id="m" class="clock-input" value="10">:
                <input type="number" id="s" class="clock-input" value="00">
            </div>
            <div class="btn-group">
                <button class="green" id="startBtn" onclick="startClock()">Start</button>
                <button class="red" onclick="stopClock()">Pause</button>
            </div>
        </div>

        <div class="box">
            <div class="label">Quick Timer</div>
            <div id="qDisplay" class="display-text">00</div>
            <div class="btn-group">
                <button class="blue" onclick="quickTimer(10)">10s</button>
                <button class="blue" onclick="quickTimer(20)">20s</button>
            </div>
        </div>

        <div class="box">
            <input type="text" class="team-input" value="HOME">
            <div id="score1" class="display-text">00</div>
            <div class="btn-group">
                <button class="green" onclick="changeScore('score1', 10)">+10</button>
                <button class="green" onclick="changeScore('score1', 5)">+5</button>
                <button class="red" onclick="changeScore('score1', -10)">-10</button>
                <button class="red" onclick="changeScore('score1', -5)">-5</button>
            </div>
        </div>

        <div class="box">
            <input type="text" class="team-input" value="AWAY">
            <div id="score2" class="display-text">00</div>
            <div class="btn-group">
                <button class="green" onclick="changeScore('score2', 10)">+10</button>
                <button class="green" onclick="changeScore('score2', 5)">+5</button>
                <button class="red" onclick="changeScore('score2', -10)">-10</button>
                <button class="red" onclick="changeScore('score2', -5)">-5</button>
            </div>
        </div>
    </div>

    <button class="gray" onclick="window.location.reload()">Reset Entire Board</button>

    <script>
        let mainInterval, quickInterval;
    
        // Clock Logic
        function startClock() {
            if (mainInterval) return;
            mainInterval = setInterval(() => {
                let mInput = document.getElementById('m');
                let sInput = document.getElementById('s');
                
                let min = parseInt(mInput.value);
                let sec = parseInt(sInput.value);
    
                if (min === 0 && sec === 0) {
                    stopClock();
                    alert("Game Over!");
                } else {
                    if (sec === 0) {
                        min--;
                        sec = 59;
                    } else {
                        sec--;
                    }
                    // Update display with padding for symmetry
                    mInput.value = min.toString().padStart(2, '0');
                    sInput.value = sec.toString().padStart(2, '0');
                }
            }, 1000);
        }
    
        function stopClock() { 
            clearInterval(mainInterval); 
            mainInterval = null; 
        }
    
        // Quick Timer Logic
        function quickTimer(duration) {
            clearInterval(quickInterval);
            let time = duration;
            const display = document.getElementById('qDisplay');
            display.innerText = time.toString().padStart(2, '0');
            display.style.color = "var(--accent)"; // Reset color from red
            
            quickInterval = setInterval(() => {
                time--;
                display.innerText = time.toString().padStart(2, '0');
                if (time <= 0) {
                    clearInterval(quickInterval);
                    display.style.color = "var(--danger)";
                }
            }, 1000);
        }
    
        // Score Logic
        function changeScore(id, amt) {
            let el = document.getElementById(id);
            let currentVal = parseInt(el.innerText);
            let newVal = currentVal + amt;
            // Ensure score doesn't go below 0 and stays 2 digits
            el.innerText = (newVal < 0 ? 0 : newVal).toString().padStart(2, '0');
        }
    </script>
</body>
</html>
