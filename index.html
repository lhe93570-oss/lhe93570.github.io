<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Scoreboard & Timer</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        /* Timer Section */
        .timer-container {
            background: var(--card);
            padding: 1.5rem 3rem;
            border-radius: 1rem;
            text-align: center;
            margin-bottom: 2rem;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        #timer-display {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .timer-controls, .quick-timers {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        /* Scoreboard Section */
        .scoreboard {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .team-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            width: 280px;
            border: 1px solid #334155;
        }
        input.team-name {
            background: transparent;
            border: none;
            border-bottom: 2px solid #334155;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            margin-bottom: 1rem;
            outline: none;
        }
        .score-display {
            font-size: 5rem;
            font-weight: 800;
            margin: 1rem 0;
        }
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        /* Buttons */
        button {
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background: #475569;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-start { background: var(--success); }
        .btn-pause { background: #f59e0b; }
        .btn-quick { background: #6366f1; }
        .plus { background: #059669; }
        .minus { background: #dc2626; }
        
        .reset-container { margin-top: 2rem; }
    </style>
</head>
<body>

    <div class="timer-container">
        <div id="timer-display">00:00</div>
        <div class="timer-controls">
            <button class="btn-start" onclick="startTimer()">START</button>
            <button class="btn-pause" onclick="pauseTimer()">PAUSE</button>
        </div>
        <div class="quick-timers">
            <button class="btn-quick" onclick="setTimer(10)">10s</button>
            <button class="btn-quick" onclick="setTimer(20)">20s</button>
            <button onclick="setTimer(0)">Clear</button>
        </div>
    </div>

    <div class="scoreboard">
        <div class="team-card">
            <input type="text" class="team-name" id="name-1" value="HOME">
            <div id="score-1" class="score-display">0</div>
            <div class="button-grid">
                <button class="plus" onclick="updateScore('1', 10)">+10</button>
                <button class="plus" onclick="updateScore('1', 5)">+5</button>
                <button class="minus" onclick="updateScore('1', -10)">-10</button>
                <button class="minus" onclick="updateScore('1', -5)">-5</button>
            </div>
        </div>

        <div class="team-card">
            <input type="text" class="team-name" id="name-2" value="AWAY">
            <div id="score-2" class="score-display">0</div>
            <div class="button-grid">
                <button class="plus" onclick="updateScore('2', 10)">+10</button>
                <button class="plus" onclick="updateScore('2', 5)">+5</button>
                <button class="minus" onclick="updateScore('2', -10)">-10</button>
                <button class="minus" onclick="updateScore('2', -5)">-5</button>
            </div>
        </div>
    </div>

    <div class="reset-container">
        <button onclick="resetAll()">Reset Match</button>
    </div>

    <script>
        let timeLeft = 0;
        let timerInterval = null;

        // Timer Logic
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            const el = document.getElementById('timer-display');
            el.innerText = display;
            el.style.color = timeLeft === 0 ? '#ef4444' : '#f8fafc';
        }

        function setTimer(seconds) {
            pauseTimer();
            timeLeft = seconds;
            updateTimerDisplay();
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    pauseTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        // Score Logic
        function updateScore(teamId, amount) {
            const el = document.getElementById(`score-${teamId}`);
            let score = parseInt(el.innerText) + amount;
            el.innerText = score < 0 ? 0 : score;
        }

        function resetAll() {
            if(confirm("Reset everything?")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
