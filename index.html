<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Game Scoreboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
            --secondary: #6366f1;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.2s;
        }

        .main-container {
            display: grid;
            grid-template-columns: repeat(2, minmax(300px, 380px));
            grid-template-rows: repeat(2, minmax(350px, 400px));
            gap: 20px;
            padding: 20px;
        }

        .box {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 2px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .display-text {
            font-size: 5rem;
            font-weight: 900;
            font-family: monospace;
            margin: 10px 0;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            outline: none;
        }

        .team-input {
            font-size: 1.8rem;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            width: 100%;
        }

        .clock-input {
            width: 100px;
            font-size: 5rem;
            font-weight: 900;
            font-family: monospace;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        button:active { transform: scale(0.95); }

        .green { background: var(--success); }
        .red { background: var(--danger); }
        .blue { background: var(--secondary); }
        .gray { background: #475569; margin-top: 20px; padding: 10px 30px; }

        .flash-red { background-color: #7f1d1d !important; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="box">
            <div class="label">Game Clock</div>
            <div class="display-text">
                <input type="number" id="m" class="clock-input" value="10">:
                <input type="number" id="s" class="clock-input" value="00">
            </div>
            <div class="btn-group">
                <button class="green" onclick="startClock()">START</button>
                <button class="red" onclick="stopClock()">PAUSE</button>
            </div>
        </div>

        <div class="box">
            <div class="label">Quick Timer</div>
            <div id="qDisplay" class="display-text">00</div>
            <div class="btn-group">
                <button class="blue" onclick="quickTimer(10)">10s</button>
                <button class="blue" onclick="quickTimer(20)">20s</button>
            </div>
        </div>
