<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetrical Game Console</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 2x2 Grid Layout */
        .main-container {
            display: grid;
            grid-template-columns: repeat(2, 350px);
            grid-template-rows: repeat(2, 380px);
            gap: 20px;
        }

        /* Unified Box Style */
        .box {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 2px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .label {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Displays */
        .display-text {
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        /* Inputs */
        input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
        }
        .team-input {
            font-size: 1.8rem;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            width: 100%;
            margin-bottom: 10px;
        }
        .clock-input {
            width: 120px;
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .green { background: var(--success); }
        .red { background: var(--danger); }
