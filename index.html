<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-Panel Game Console</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
            --secondary: #6366f1;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2x2 Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 320px);
            grid-template-rows: repeat(2, 380px);
            gap: 20px;
            padding: 20px;
        }

        /* Unified Box Styling */
        .box {
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .label {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        /* Big Displays (Scores and Timers) */
        .main-display {
            font-size: 5rem;
            font-weight: 800;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        /* Input Styling */
        input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-family: inherit;
        }
        input.team-name {
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            width: 100%;
        }
        .clock-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-weight: 800;
        }
        .clock-inputs input {
            width: 110px;
            font-size: 5rem;
            font-weight: 800;
        }

        /* Button Grid */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        .btn-blue { background: var(--secondary); }
        .btn-gray { background: #475569; }

    </style>
</head>
<body>

    <div class="grid-container">
        
        <div class="box">
            <div class="label">Game Clock</div>
            <div class="clock-inputs">
                <input type="number" id="min" value="10" min="0" max="99">:
                <input type="number" id="sec" value="00" min="0" max="59">
            </div>
            <div class="controls">
                <button class="btn-green" id="start-btn" onclick="toggleClock()">Start</button>
                <button class="btn-red" onclick="pauseClock()">Pause</button>
            </div>
        </div>

        <div class="box">
            <div class="label">Question Timer</div>
            <div id="quick-display" class="main-display">00</div>
            <div class="controls">
                <button class="btn-blue" onclick="runQuick(10)">10 Seconds</button>
                <button class="btn-blue" onclick="runQuick(20)">20 Seconds</button>
            </div>
        </div>

        <div class="box">
            <input type="text" class="team-name" value="HOME">
            <div id="s1" class="main-display">0</div>
            <div class="controls">
                <button class="btn-green" onclick="add('s1', 10)">+10</button>
                <button class="btn-green" onclick="add('s1', 5)">+5</button>
                <button class="btn-red" onclick="add('s1', -10)">-10</button>
                <button class="btn-red" onclick="add('s1', -5)">-5</button>
            </div>
        </div>

        <div class="box">
            <input type="text" class="team-name" value="AWAY">
            <div id="s2" class="main-display">0</div>
            <div class="controls">
                <button class="btn-green" onclick="add('s2', 10)">+10</button>
                <button class="btn-green" onclick="add('s2', 5)">+5</button>
                <button class="btn-red" onclick="add('s2', -10)">-10</button>
                <button class="btn-red" onclick="add('s2', -5)">-5</button>
            </div>
        </div>

    </div>

    <script>
        // --- Game Clock Logic ---
        let mainInterval;
        let isRunning = false;

        function toggleClock() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('start-btn').style.opacity = "0.5";

            mainInterval = setInterval(() => {
                let m = parseInt(document.getElementById('min').value);
                let s = parseInt(document.getElementById('sec').value);

                if (m === 0 && s === 0) {
                    pauseClock();
                    alert("Time is up!");
                    return;
                }

                if (s <= 0) {
                    m--;
                    s = 59;
                } else {
                    s--;
                }

                document.getElementById('min').value = m;
                document.getElementById('sec').value = s.toString().padStart(2, '0');
            }, 1000);
        }

        function pauseClock() {
            clearInterval(mainInterval);
            isRunning = false;
            document.getElementById('start-btn').style.opacity = "1";
        }

        // --- Quick Timer Logic ---
        let quickInterval;
        function runQuick(seconds) {
            clearInterval(quickInterval);
            let time = seconds;
            const display = document.getElementById('quick-display');
            display.innerText = time;
            display.style.color = "white";

            quickInterval = setInterval(() => {
                time--;
                display.innerText = time.toString().padStart(2, '0');
                if (time <= 0) {
                    clearInterval(quickInterval);
                    display.style.color = "var(--danger)";
                }
            }, 1000);
        }

        // --- Score Logic ---
        function add(id, amt) {
            let el = document.getElementById(id);
            let val = parseInt(el.innerText) + amt;
            el.innerText = val < 0 ? 0 : val;
        }
    </script>
</body>
</html>
