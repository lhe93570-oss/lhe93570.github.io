
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetrical Game Console</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 2x2 Grid Layout */
        .main-container {
            display: grid;
            grid-template-columns: repeat(2, 350px);
            grid-template-rows: repeat(2, 380px);
            gap: 20px;
        }

        /* Unified Box Style */
        .box {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 2px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .label {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Displays */
        .clock-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }
        
        .display-text {
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        /* Inputs */
        input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
        }
        .team-input {
            font-size: 1.8rem;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            width: 100%;
            margin-bottom: 10px;
        }
        .clock-input {
            width: 110px;
            font-size: 5.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .green { background: var(--success); }
        .red { background: var(--danger); }
        .blue { background: #6366f1; }
        .gray { background: #475569; margin-top: 30px; padding: 10px 30px; }

        /* Remove arrows from number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="box">
            <div class="label">Game Clock</div>
            <div class="clock-wrapper">
                <input type="number" id="m" class="clock-input" value="10">:
                <input type="number" id="s" class="clock-input" value="00">
            </div>
            <div class="btn-group">
                <button class="green" id="startBtn" onclick="startClock()">Start</button>
                <button class="red" onclick="stopClock()">Pause</button>
            </div>
        </div>

        <div class="box">
            <div class="label">Quick Timer</div>
            <div id="qDisplay" class="display-text">00</div>
            <div class="btn-group">
                <button class="blue" onclick="setQuickTimer(10)">Set 10s</button>
                <button class="blue" onclick="setQuickTimer(20)">Set 20s</button>
                <button class="green" onclick="startQuickTimer()">Start</button>
                <button class="red" onclick="pauseQuickTimer()">Pause</button>
            </div>
        </div>

        <div class="box">
            <input type="text" class="team-input" value="HOME">
            <div id="score1" class="display-text">00</div>
            <div class="btn-group">
                <button class="green" onclick="changeScore('score1', 10)">+10</button>
                <button class="green" onclick="changeScore('score1', 5)">+5</button>
                <button class="red" onclick="changeScore('score1', -10)">-10</button>
                <button class="red" onclick="changeScore('score1', -5)">-5</button>
            </div>
        </div>

        <div class="box">
            <input type="text" class="team-input" value="AWAY">
            <div id="score2" class="display-text">00</div>
            <div class="btn-group">
                <button class="green" onclick="changeScore('score2', 10)">+10</button>
                <button class="green" onclick="changeScore('score2', 5)">+5</button>
                <button class="red" onclick="changeScore('score2', -10)">-10</button>
                <button class="red" onclick="changeScore('score2', -5)">-5</button>
            </div>
        </div>
    </div>

    <button class="gray" onclick="window.location.reload()">Reset Entire Board</button>

<script>
        let mainInterval = null;
        let quickInterval = null;
        let quickTimeLeft = 0;

        // Buzzer Audio Generator
        function playBuzzer() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime); 
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);
        }

        // Game Clock Logic
        function startClock() {
            if (mainInterval) return;
            
            let mInput = document.getElementById('m');
            let sInput = document.getElementById('s');

            // BUG FIX 3: Sanitize manual inputs (prevent empty/NaN or negative numbers)
            let min = Math.max(0, parseInt(mInput.value) || 0);
            let sec = Math.max(0, parseInt(sInput.value) || 0);
            
            // Format immediately just in case user typed single digits
            mInput.value = min;
            sInput.value = sec.toString().padStart(2, '0');

            // Don't start if already at zero
            if (min === 0 && sec === 0) return;

            mainInterval = setInterval(() => {
                // BUG FIX 1: Decrement the time FIRST...
                if (sec === 0) { 
                    min--; 
                    sec = 59; 
                } else { 
                    sec--; 
                }
                
                // ...Then update the UI...
                mInput.value = min;
                sInput.value = sec.toString().padStart(2, '0');

                // ...Then check if it hit zero.
                if (min === 0 && sec === 0) {
                    stopClock();
                    playBuzzer();
                    
                    // BUG FIX 2: Add a tiny delay to the alert so the buzzer has time to play
                    // and the UI has time to visually update to 0:00
                    setTimeout(() => {
                        alert("Game Over!");
                    }, 50);
                }
            }, 1000);
        }
        
        function stopClock() { 
            clearInterval(mainInterval); 
            mainInterval = null; 
        }

        // Quick Timer Logic
        function setQuickTimer(duration) {
            pauseQuickTimer();
            quickTimeLeft = duration;
            updateQuickDisplay();
            document.getElementById('qDisplay').style.color = "white";
            
            // Start the timer immediately after setting it
            startQuickTimer(); 
        }

        function startQuickTimer() {
            if (quickInterval || quickTimeLeft <= 0) return;
            
            const display = document.getElementById('qDisplay');
            display.style.color = "white";
            
            quickInterval = setInterval(() => {
                quickTimeLeft--;
                updateQuickDisplay();
                
                if (quickTimeLeft <= 0) {
                    pauseQuickTimer();
                    display.style.color = "var(--danger)";
                    playBuzzer();
                }
            }, 1000);
        }

        function pauseQuickTimer() {
            clearInterval(quickInterval);
            quickInterval = null;
        }

        function updateQuickDisplay() {
            document.getElementById('qDisplay').innerText = quickTimeLeft.toString().padStart(2, '0');
        }

        // Score Logic
        function changeScore(id, amt) {
            let el = document.getElementById(id);
            let val = parseInt(el.innerText) + amt;
            el.innerText = val < 0 ? "00" : val.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
