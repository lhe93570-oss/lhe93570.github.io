<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Scoreboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .scoreboard {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .team-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        input.team-name {
            background: transparent;
            border: none;
            border-bottom: 2px solid #334155;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            margin-bottom: 1rem;
            outline: none;
        }
        input.team-name:focus { border-color: var(--accent); }
        .score-display {
            font-size: 5rem;
            font-weight: 800;
            margin: 1rem 0;
            font-variant-numeric: tabular-nums;
        }
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        button {
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            background: #334155;
            color: white;
            transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.95); }
        button.plus { background: #059669; }
        button.minus { background: #dc2626; }
        .reset-container { margin-top: 3rem; }
        #reset-btn {
            background: #475569;
            padding: 0.8rem 2rem;
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="team-card">
            <input type="text" class="team-name" id="name-1" value="TEAM 1" oninput="saveData()">
            <div id="score-1" class="score-display">0</div>
            <div class="button-grid">
                <button class="plus" onclick="updateScore('1', 10)">+10</button>
                <button class="plus" onclick="updateScore('1', 5)">+5</button>
                <button class="minus" onclick="updateScore('1', -10)">-10</button>
                <button class="minus" onclick="updateScore('1', -5)">-5</button>
            </div>
        </div>

        <div class="team-card">
            <input type="text" class="team-name" id="name-2" value="TEAM 2" oninput="saveData()">
            <div id="score-2" class="score-display">0</div>
            <div class="button-grid">
                <button class="plus" onclick="updateScore('2', 10)">+10</button>
                <button class="plus" onclick="updateScore('2', 5)">+5</button>
                <button class="minus" onclick="updateScore('2', -10)">-10</button>
                <button class="minus" onclick="updateScore('2', -5)">-5</button>
            </div>
        </div>
    </div>

    <div class="reset-container">
        <button id="reset-btn" onclick="resetBoard()">Reset All</button>
    </div>

    <script>
        // Load data on startup
        window.onload = () => {
            if(localStorage.getItem('scoreboardData')) {
                const data = JSON.parse(localStorage.getItem('scoreboardData'));
                document.getElementById('name-1').value = data.n1;
                document.getElementById('name-2').value = data.n2;
                document.getElementById('score-1').innerText = data.s1;
                document.getElementById('score-2').innerText = data.s2;
            }
        };

        function updateScore(teamId, amount) {
            const scoreElement = document.getElementById(`score-${teamId}`);
            let currentScore = parseInt(scoreElement.innerText);
            currentScore += amount;
            
            if (currentScore < 0) currentScore = 0;
            scoreElement.innerText = currentScore;
            saveData();
        }

        function saveData() {
            const data = {
                n1: document.getElementById('name-1').value,
                n2: document.getElementById('name-2').value,
                s1: document.getElementById('score-1').innerText,
                s2: document.getElementById('score-2').innerText
            };
            localStorage.setItem('scoreboardData', JSON.stringify(data));
        }

        function resetBoard() {
            if(confirm("Are you sure you want to reset names and scores?")) {
                localStorage.removeItem('scoreboardData');
                location.reload();
            }
        }
    </script>
</body>
</html>
